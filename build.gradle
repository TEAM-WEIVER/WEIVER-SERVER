plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.13'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.weiver'
version = '0.0.1-SNAPSHOT'
description = 'AI Interview & Job Matching Service'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

ext {
    set('springCloudAwsVersion', '3.4.2')
    set('jjwtVersion', '0.12.6')
    set('querydslVersion', '5.1.0')
    set('testcontainersVersion', '1.20.4')
    set('mapstructVersion', '1.6.3')
}

dependencies {

    //----------------------------------------------------------------------
    // 1. Web Layer
    //----------------------------------------------------------------------

    // 기본 REST API
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // Websocket
    implementation 'org.springframework.boot:spring-boot-starter-websocket'

    // 입력값 검증
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // WebFlux(WebClient)
    implementation 'org.springframework.boot:spring-boot-starter-webflux'

    //----------------------------------------------------------------------
    // 2. Security & JWT
    //----------------------------------------------------------------------

    // Spring Security
    implementation 'org.springframework.boot:spring-boot-starter-security'

    // JWT 라이브러리
    implementation "io.jsonwebtoken:jjwt-api:${jjwtVersion}"
    runtimeOnly "io.jsonwebtoken:jjwt-impl:${jjwtVersion}"
    runtimeOnly "io.jsonwebtoken:jjwt-jackson:${jjwtVersion}"

    //----------------------------------------------------------------------
    // 3. Data Layer
    //----------------------------------------------------------------------

    // Spring Data JPA
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'

    // PostgreSQL 드라이버
    runtimeOnly 'org.postgresql:postgresql'

    // Flyway
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.flywaydb:flyway-database-postgresql'

    // QueryDSL
    implementation "com.querydsl:querydsl-jpa:${querydslVersion}:jakarta"
    annotationProcessor "com.querydsl:querydsl-apt:${querydslVersion}:jakarta"
    annotationProcessor 'jakarta.annotation:jakarta.annotation-api'
    annotationProcessor 'jakarta.persistence:jakarta.persistence-api'

    //----------------------------------------------------------------------
    // 4. Cache
    //----------------------------------------------------------------------

    implementation 'org.springframework.boot:spring-boot-starter-data-redis'

    // ----------------------------------------------------------------------
    // 5. Message Queue
    // -----------------------------------------------------------------------

    // AMQP (RabbitMQ)
    implementation 'org.springframework.boot:spring-boot-starter-amqp'

    // ----------------------------------------------------------------------
    // 6. AWS
    // ----------------------------------------------------------------------

    // Spring Cloud AWS S3 (추후 S3 연동 시 도입 예정)
    // implementation 'io.awspring.cloud:spring-cloud-aws-starter-s3'

    // ----------------------------------------------------------------------
    // 7. Monitoring
    // ----------------------------------------------------------------------


    // ----------------------------------------------------------------------
    // 8. Utilities
    // ----------------------------------------------------------------------

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // MapStruct
    implementation "org.mapstruct:mapstruct:${mapstructVersion}"
    annotationProcessor "org.mapstruct:mapstruct-processor:${mapstructVersion}"

    // binding
    annotationProcessor 'org.projectlombok:lombok-mapstruct-binding:0.2.0'

    // swagger
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.13'

    // ----------------------------------------------------------------------
    // 9. Testing
    // ----------------------------------------------------------------------

    // Spring Boot 테스트 기본
    testImplementation 'org.springframework.boot:spring-boot-starter-test'

    // Spring Security 테스트
    testImplementation 'org.springframework.security:spring-security-test'

    // RabbitMQ 테스트
    testImplementation 'org.springframework.amqp:spring-rabbit-test'

    // Testcontainers
    compileOnly "org.testcontainers:testcontainers"
    developmentOnly "org.testcontainers:testcontainers"
    developmentOnly "org.testcontainers:jdbc"
    developmentOnly "org.testcontainers:postgresql"

    testImplementation "org.testcontainers:junit-jupiter"
    testImplementation "org.testcontainers:postgresql"
    testImplementation "org.testcontainers:rabbitmq"

    // JUnit Platform Launcher
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// BOM
dependencyManagement {
    imports {
        mavenBom "io.awspring.cloud:spring-cloud-aws-dependencies:${springCloudAwsVersion}"
        mavenBom "org.testcontainers:testcontainers-bom:${testcontainersVersion}"
    }
}

// QueryDSL Q 클래스 생성 경로 설정
def querydslDir = layout.buildDirectory.dir("generated/querydsl").get().asFile.path
sourceSets {
    main {
        java {
            srcDirs querydslDir
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    // QueryDSL Q클래스 생성 위치 지정
    options.generatedSourceOutputDirectory = file(querydslDir)
}

// clean 시 Q클래스도 함께 삭제
clean {
    doLast {
        file(querydslDir).deleteDir()
    }
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()

    // 테스트 병렬 실행 (Testcontainers 사용 시 주의: 컨테이너 포트 충돌 가능)
    // MVP 단계에서는 일단 순차 실행이 안정적
    // maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1

    // 테스트 JVM 힙 메모리
    jvmArgs '-Xmx512m'

    // 테스트 결과 로깅
    testLogging {
        events 'passed', 'skipped', 'failed'
        showExceptions = true
        showCauses = true
    }
}

bootJar {
    archiveFileName = 'app.jar'
}

jar {
    enabled = false
}